name: CI - Build and Push Microservices

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make mvnw executable
        run: |
          chmod +x facturacion/mvnw
          chmod +x tax-service/mvnw
          chmod +x payment-service/mvnw

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Build facturacion
        working-directory: facturacion
        run: ./mvnw -DskipTests package

      - name: Build tax-service
        working-directory: tax-service
        run: ./mvnw -DskipTests package

      # 👇 NUEVO
      - name: Build payment-service
        working-directory: payment-service
        run: ./mvnw -DskipTests package

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push facturacion
        uses: docker/build-push-action@v5
        with:
          context: ./facturacion
          push: true
          tags: pcastrol/facturacion:latest

      - name: Build and Push tax-service
        uses: docker/build-push-action@v5
        with:
          context: ./tax-service
          push: true
          tags: pcastrol/tax-service:latest

      # 👇 NUEVO
      - name: Build and Push payment-service
        uses: docker/build-push-action@v5
        with:
          context: ./payment-service
          push: true
          tags: pcastrol/payment-service:latest